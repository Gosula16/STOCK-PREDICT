name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          GATEWAY_URL: http://127.0.0.1:3001
          API_SECRET: ci-build-placeholder-not-used-at-runtime-32chars

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gateway/package-lock.json
      - run: npm ci
      - run: npm run build

  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: false
          tags: rentai-orchestrator:ci
      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: false
          tags: rentai-gateway:ci
